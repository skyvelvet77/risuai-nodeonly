name: Create GitHub Release with Portable Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: |
            dist/
            server/
            package.json
            pnpm-lock.yaml
            update.sh
          retention-days: 1

  portable:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: portable/

      - name: Install production dependencies for Windows
        shell: bash
        run: |
          cd portable
          echo "node-linker=hoisted" > .npmrc
          pnpm install --prod --frozen-lockfile

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download Node.js binary
        shell: bash
        run: |
          NODE_VERSION="22.14.0"
          mkdir -p portable/bin
          URL="https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-win-x64.zip"
          curl -fsSL "$URL" -o node.zip
          unzip -q node.zip
          cp "node-v${NODE_VERSION}-win-x64/node.exe" portable/bin/node.exe

      - name: Add launcher scripts
        shell: bash
        run: |
          printf '@echo off\r\nsetlocal\r\ntitle RisuAI NodeOnly\r\nset PORT=6001\r\nstart "" "http://localhost:%%PORT%%"\r\n"%%~dp0bin\\node.exe" "%%~dp0server\\node\\server.cjs"\r\npause\r\n' > portable/RisuAI.bat
          printf '@echo off\r\n"%%~dp0bin\\node.exe" "%%~dp0scripts\\updater.cjs"\r\npause\r\n' > portable/update.bat

      - name: Add updater script
        shell: bash
        run: |
          mkdir -p portable/scripts
          cp scripts/updater.cjs portable/scripts/updater.cjs 2>/dev/null || true

      - name: Package portable
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NAME="RisuAI-NodeOnly-v${VERSION}-win-x64"
          cd portable
          7z a -tzip "../${NAME}.zip" .

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-win-x64
          path: RisuAI-NodeOnly-*
          retention-days: 1

  release:
    needs: portable
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all portable artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: portable-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: true
          files: RisuAI-NodeOnly-*
